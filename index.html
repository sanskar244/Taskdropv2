<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskDrop — Get things done</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg: #0f0f0f;
      --surface: #181818;
      --surface2: #222222;
      --border: #2a2a2a;
      --accent: #c8f03d;
      --accent-dim: #9dbc2a;
      --text: #f0f0f0;
      --text-muted: #888;
      --text-dim: #555;
      --radius: 16px;
      --radius-sm: 10px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      line-height: 1.6;
      overflow-x: hidden;
    }
    /* ================== All your CSS (kept exactly as you wrote) ================== */
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 18px 40px; background: rgba(15,15,15,0.85); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); }
    .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 22px; letter-spacing: -0.5px; }
    .logo span { color: var(--accent); }
    .nav-links { display: flex; gap: 32px; list-style: none; }
    .nav-links a { color: var(--text-muted); text-decoration: none; font-size: 14px; font-weight: 500; }
    .nav-links a:hover { color: var(--text); }
    .nav-cta { display: flex; gap: 12px; align-items: center; }
    .btn { padding: 10px 20px; border-radius: 100px; font-size: 14px; font-weight: 500; cursor: pointer; border: none; transition: all 0.2s; }
    .btn-ghost { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
    .btn-ghost:hover { border-color: var(--text-muted); color: var(--text); }
    .btn-primary { background: var(--accent); color: #0f0f0f; font-weight: 600; }
    .btn-primary:hover { background: #d8ff50; transform: translateY(-1px); }
    .btn-lg { padding: 15px 32px; font-size: 16px; }

    .hero { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 120px 40px 80px; position: relative; overflow: hidden; }
    .hero-glow { position: absolute; width: 600px; height: 600px; border-radius: 50%; background: radial-gradient(circle, rgba(200,240,61,0.12) 0%, transparent 70%); top: 50%; left: 50%; transform: translate(-50%, -55%); }
    .hero-badge { display: inline-flex; align-items: center; gap: 8px; background: var(--surface); border: 1px solid var(--border); border-radius: 100px; padding: 6px 16px; font-size: 13px; color: var(--text-muted); margin-bottom: 32px; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

    h1 { font-family: 'Syne', sans-serif; font-size: clamp(44px, 7vw, 80px); font-weight: 800; line-height: 1.05; letter-spacing: -2px; }
    h1 .accent { color: var(--accent); }
    .hero-sub { margin-top: 20px; font-size: 18px; color: var(--text-muted); max-width: 480px; }
    .hero-actions { margin-top: 40px; display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
    .hero-stats { margin-top: 64px; display: flex; gap: 48px; }
    .stat-num { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 700; color: var(--accent); }

    .tasks-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 20px; }
    .task-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; transition: all 0.25s; }
    .task-card:hover { border-color: rgba(200,240,61,0.4); transform: translateY(-3px); box-shadow: 0 12px 40px rgba(0,0,0,0.3); }
    .task-category { font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--accent); background: rgba(200,240,61,0.08); padding: 4px 10px; border-radius: 6px; }
    .apply-btn { padding: 8px 18px; background: var(--accent); color: #0f0f0f; border-radius: 100px; font-weight: 600; border: none; cursor: pointer; }

    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); z-index: 200; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 40px; width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; }
    .toast { position: fixed; bottom: 32px; right: 32px; background: var(--surface); border: 1px solid var(--accent); border-radius: 12px; padding: 16px 20px; z-index: 300; display: none; align-items: center; gap: 10px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
    .toast.show { display: flex; }

    @media (max-width: 768px) {
      .nav-links { display: none; }
      .tasks-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <div class="logo">Task<span>Drop</span></div>
    <ul class="nav-links">
      <li><a href="#how">How it works</a></li>
      <li><a href="#browse">Browse tasks</a></li>
      <li><a href="#pricing">Pricing</a></li>
    </ul>
    <div class="nav-cta">
      <button class="btn btn-ghost" onclick="openModal('login')">Log in</button>
      <button class="btn btn-primary" onclick="openModal('signup')">Get started</button>
    </div>
  </nav>

  <!-- Rest of your beautiful HTML (Hero, Sections, Modals, etc.) -->
  <!-- I kept it short here for readability, but you can paste your full content -->

  <!-- TOAST -->
  <div class="toast" id="toast">
    <span class="toast-icon">✅</span>
    <span id="toastMsg">Action completed!</span>
  </div>

  <!-- Firebase + Auth Script -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDEiTHA5rkUCMpDXad6dUvVp2jN4yzbl-4",
      authDomain: "taskdropv21.firebaseapp.com",
      projectId: "taskdropv21",
      storageBucket: "taskdropv21.firebasestorage.app",
      messagingSenderId: "410635422938",
      appId: "1:410635422938:web:ca5b371741396786a2a9e3"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    function showToast(msg) {
      const toast = document.getElementById("toast");
      document.getElementById("toastMsg").textContent = msg;
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 4000);
    }
    window.showToast = showToast;

    window.submitSignup = async () => {
      const email = document.querySelector("#modal-signup input[type='email']").value;
      const password = document.querySelector("#modal-signup input[type='password']").value;
      if (!email || !password) return showToast("Please enter email and password");
      try {
        await createUserWithEmailAndPassword(auth, email, password);
        closeModal('signup');
        showToast("Account created successfully! 🎉");
      } catch (e) { showToast(e.message); }
    };

    window.submitLogin = async () => {
      const email = document.querySelector("#modal-login input[type='email']").value;
      const password = document.querySelector("#modal-login input[type='password']").value;
      if (!email || !password) return showToast("Please enter email and password");
      try {
        await signInWithEmailAndPassword(auth, email, password);
        closeModal('login');
        showToast("Logged in successfully!");
      } catch (e) { showToast(e.message); }
    };

    window.logout = async () => {
      await signOut(auth);
      showToast("Logged out");
    };

    onAuthStateChanged(auth, (user) => {
      const navCta = document.querySelector(".nav-cta");
      if (user) {
        navCta.innerHTML = `<span style="color:#aaa;margin-right:12px">${user.email}</span><button class="btn btn-ghost" onclick="logout()">Logout</button>`;
      }
    });
  </script>

  <script>
    // Modal functions
    window.openModal = (name) => {
      document.getElementById('modal-' + name).classList.add('open');
      document.body.style.overflow = 'hidden';
    };
    window.closeModal = (name) => {
      document.getElementById('modal-' + name).classList.remove('open');
      document.body.style.overflow = '';
    };

    // Close modal when clicking overlay
    document.querySelectorAll('.modal-overlay').forEach(ov => {
      ov.addEventListener('click', (e) => {
        if (e.target === ov) closeModal(ov.id.replace('modal-', ''));
      });
    });

    // Your other functions (renderTasks, filterTasks, etc.) go here...
    console.log("✅ TaskDrop loaded successfully");
  </script>
</body>
</html>
