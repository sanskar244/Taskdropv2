  <!-- TOAST -->
  <div class="toast" id="toast">
    <span class="toast-icon">✅</span>
    <span id="toastMsg">Action completed!</span>
  </div>

  <!-- Firebase Script (Only ONE, at the very end) -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getAuth,
      createUserWithEmailAndPassword,
      signInWithEmailAndPassword,
      signOut,
      onAuthStateChanged,
      GoogleAuthProvider,
      signInWithPopup
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDEiTHA5rkUCMpDXad6dUvVp2jN4yzbl-4",
      authDomain: "taskdropv21.firebaseapp.com",
      projectId: "taskdropv21",
      storageBucket: "taskdropv21.firebasestorage.app",
      messagingSenderId: "410635422938",
      appId: "1:410635422938:web:ca5b371741396786a2a9e3"
    };

    // Prevent duplicate initialization
    let app;
    if (!firebase?.apps?.length) {
      app = initializeApp(firebaseConfig);
    } else {
      app = firebase.apps[0];
    }

    const auth = getAuth(app);
    console.log("✅ Firebase initialized successfully");

    // Toast function
    function showToast(msg) {
      const toast = document.getElementById("toast");
      document.getElementById("toastMsg").textContent = msg;
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 3500);
    }
    window.showToast = showToast;

    // Submit Signup
    window.submitSignup = async function() {
      const email = document.querySelector("#modal-signup input[type='email']").value;
      const password = document.querySelector("#modal-signup input[type='password']").value;
      if (!email || !password) return showToast("Please fill email and password");

      try {
        await createUserWithEmailAndPassword(auth, email, password);
        closeModal("signup");
        showToast("Account created successfully! 🎉");
      } catch (e) {
        showToast(e.message);
      }
    };

    // Submit Login
    window.submitLogin = async function() {
      const email = document.querySelector("#modal-login input[type='email']").value;
      const password = document.querySelector("#modal-login input[type='password']").value;
      if (!email || !password) return showToast("Please fill email and password");

      try {
        await signInWithEmailAndPassword(auth, email, password);
        closeModal("login");
        showToast("Logged in successfully!");
      } catch (e) {
        showToast(e.message);
      }
    };

    // Logout
    window.logout = async function() {
      try {
        await signOut(auth);
        showToast("Logged out");
      } catch (e) {
        showToast("Logout failed");
      }
    };

    // Auth State Listener
    onAuthStateChanged(auth, (user) => {
      const navCta = document.querySelector(".nav-cta");
      if (user) {
        navCta.innerHTML = `
          <span style="color:var(--text-muted); margin-right:12px; font-size:14px;">
            ${user.email}
          </span>
          <button class="btn btn-ghost" onclick="logout()">Logout</button>
        `;
      } else {
        navCta.innerHTML = `
          <button class="btn btn-ghost" onclick="openModal('login')">Log in</button>
          <button class="btn btn-primary" onclick="openModal('signup')">Get started</button>
        `;
      }
    });
  </script>

  <script>

    window.openModal = function(name) {
      document.getElementById('modal-' + name).classList.add('open');
      document.body.style.overflow = 'hidden';
    };
    window.closeModal = function(name) {
      document.getElementById('modal-' + name).classList.remove('open');
      document.body.style.overflow = '';

  </script>
