<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskDrop — Get things done</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
/* ================= YOUR ENTIRE CSS (UNCHANGED) ================= */
:root {
  --bg: #0f0f0f;
  --surface: #181818;
  --surface2: #222222;
  --border: #2a2a2a;
  --accent: #c8f03d;
  --text: #f0f0f0;
  --text-muted: #888;
  --text-dim: #555;
  --radius: 16px;
  --radius-sm: 10px;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  overflow-x: hidden;
}

/* KEEP ALL YOUR EXISTING STYLES BELOW (UNCHANGED) */
</style>
</head>

<body>

<!-- ================= NAV (UNCHANGED) ================= -->
<nav>
  <div class="logo">Task<span>Drop</span></div>

  <div class="nav-cta">
    <button class="btn btn-ghost" onclick="openModal('login')">Log in</button>
    <button class="btn btn-primary" onclick="openModal('signup')">Get started</button>
  </div>
</nav>

<!-- ================= YOUR FULL WEBSITE CONTENT (UNCHANGED) ================= -->
<!-- (YOU KEEP EVERYTHING: HERO, TASKS, PRICING, MODALS, ETC.) -->

<!-- LOGIN MODAL (ONLY ADD GOOGLE BUTTON) -->
<div class="modal-overlay" id="modal-login">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('login')">✕</button>

    <h3>Welcome back</h3>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="login-email">
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" id="login-password">
    </div>

    <button class="btn btn-primary" style="width:100%" onclick="submitLogin()">
      Log in
    </button>

    <!-- ✅ GOOGLE LOGIN ADDED -->
    <button class="btn btn-ghost"
      style="width:100%;margin-top:10px"
      onclick="signInWithGoogle()">
      Continue with Google
    </button>
  </div>
</div>

<!-- SIGNUP MODAL (UNCHANGED) -->
<div class="modal-overlay" id="modal-signup">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('signup')">✕</button>

    <h3>Create account</h3>

    <div class="form-group">
      <label>Name</label>
      <input type="text" id="signup-name">
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="signup-email">
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" id="signup-password">
    </div>

    <button class="btn btn-primary" style="width:100%" onclick="submitSignup()">
      Create account
    </button>
  </div>
</div>

<!-- TOAST (UNCHANGED) -->
<div class="toast" id="toast">
  <span id="toastMsg">Done</span>
</div>

<script>
/* ================= YOUR EXISTING JS (UNCHANGED) ================= */
function showToast(msg) {
  const toast = document.getElementById("toast");
  if (!toast) return alert(msg);

  document.getElementById("toastMsg").textContent = msg;
  toast.classList.add("show");
  setTimeout(() => toast.classList.remove("show"), 3000);
}

function openModal(id) {
  document.getElementById("modal-" + id).classList.add("open");
}

function closeModal(id) {
  document.getElementById("modal-" + id).classList.remove("open");
}
</script>

<!-- ================= FIREBASE (ONLY FIXED + GOOGLE ADDED) ================= -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  signOut,
  onAuthStateChanged,
  GoogleAuthProvider,
  signInWithPopup
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

/* ✅ FIXED FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyDEiTHA5rkUCMpDXad6dUvVp2jN4yzbl-4",
  authDomain: "taskdropv21.firebaseapp.com",
  projectId: "taskdropv21",
  storageBucket: "taskdropv21.appspot.com", // FIXED
  messagingSenderId: "410635422938",
  appId: "1:410635422938:web:ca5b371741396786a2a9e3"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

/* ================= SIGNUP ================= */
window.submitSignup = async function () {
  const email = document.getElementById("signup-email")?.value;
  const password = document.getElementById("signup-password")?.value;

  try {
    await createUserWithEmailAndPassword(auth, email, password);
    closeModal("signup");
    showToast("✅ Account created");
  } catch (e) {
    showToast("❌ " + e.message);
  }
};

/* ================= LOGIN ================= */
window.submitLogin = async function () {
  const email = document.getElementById("login-email")?.value;
  const password = document.getElementById("login-password")?.value;

  try {
    await signInWithEmailAndPassword(auth, email, password);
    closeModal("login");
    showToast("✅ Logged in");
  } catch (e) {
    showToast("❌ " + e.message);
  }
};

/* ================= GOOGLE LOGIN (NEW) ================= */
window.signInWithGoogle = async function () {
  try {
    await signInWithPopup(auth, provider);
    closeModal("login");
    showToast("✅ Google login successful");
  } catch (e) {
    showToast("❌ " + e.message);
  }
};

/* ================= LOGOUT ================= */
window.submitLogout = async function () {
  try {
    await signOut(auth);
    showToast("👋 Logged out");
  } catch (e) {
    showToast("❌ " + e.message);
  }
};

/* ================= AUTH STATE ================= */
onAuthStateChanged(auth, (user) => {
  const nav = document.querySelector(".nav-cta");
  if (!nav) return;

  if (user) {
    nav.innerHTML = `
      <span style="color:var(--text-muted);font-size:13px;">
        ${user.displayName || user.email}
      </span>
      <button class="btn btn-ghost" onclick="submitLogout()">Logout</button>
    `;
  } else {
    nav.innerHTML = `
      <button class="btn btn-ghost" onclick="openModal('login')">Log in</button>
      <button class="btn btn-primary" onclick="openModal('signup')">Get started</button>
    `;
  }
});

console.log("Firebase + Google Auth Ready");
</script>

</body>
</html>
